[pytest]
pythonpath = .
testpaths = tests
addopts = --strict-markers
markers =
    unit: fast isolated tests that run on the default SQLite-backed test setup
    integration: cross-module tests that may still run on SQLite unless explicitly marked otherwise
    load: capacity, concurrency, and benchmark-style tests
    postgres_required: tests that require a PostgreSQL-backed test database and will be skipped on SQLite
